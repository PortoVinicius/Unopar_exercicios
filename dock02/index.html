<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante XYZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Restaurante XYZ</h1>
    </header>
    <main>
        <section class="menu">
            <h2>Menu</h2>
            <div class="grid">
                <div class="grid-item">Prato 1</div>
                <div class="grid-item">Prato 2</div>
                <div class="grid-item">Prato 3</div>
                <div class="grid-item">Prato 4</div>
            </div>
        </section>
        <section class="contact">
            <h2>Contato</h2>
            <p>Telefone: 123456789</p>
            <p>Enderço: Rua Exemplo. 123</p>
        </section>
        <section class="gallery">
            <h2>Galeria de fotos</h2>
            <div class="grid">
                <div class="grid-utem">Foto 1</div>
                <div class="grid-utem">Foto 2</div>
                <div class="grid-utem">Foto 3</div>
                <div class="grid-utem">Foto 4</div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 REstaurante XYZ</p>
    </footer>
</body>
</html>
